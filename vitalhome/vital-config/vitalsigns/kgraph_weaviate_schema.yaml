# schema file for vector vitalservice
# this is used to override using the ontology directly for the schema
# which can be used in place of/or until the ontology has vector annotations
# the vitalservice config file specifies the embedding models for classes (collections)
# so either the ontology or schema must define collections/classes and the
# vitalservice config info augments this

# schema file for haley-kg weaviate

name: HaleyKGSchema
type: Weaviate
# use all caps since weaviate upper-cases first letter
# this value comes from vitalsigns config
namespace: KGRAPH
version: 1.0

collections:
  - name: KGAgent
    description: "Knowledge Graph Agent"
    multi_tenant: false
    class_uri: "http://vital.ai/ontology/haley-ai-kg#KGAgent"
    named_vectors:
      - name: value
      - name: type
    properties:
      - name: uri
        property_uri: "http://vital.ai/ontology/vital-core#URIProp"
        type: string
        description: "Globally Unique identifier"
      - name: kGTenantIdentifier
        property_uri: "http://vital.ai/ontology/haley-ai-kg#hasKGTenantIdentifier"
        type: string
        description: "Tenant Identifier"
      - name: accountID
        property_uri: "http://vital.ai/ontology/vital#hasAccountID"
        type: string
        description: "Account Identifier"
      - name: knowledgeGraphID
        property_uri: "http://vital.ai/ontology/haley#hasKnowledgeGraphID"
        type: string
        description: "Knowledge Graph Identifier"
      - name: kGAgentName
        property_uri: "http://vital.ai/ontology/haley-ai-kg#hasKGAgentName"
        type: string
        named_vectors:
          - value
        description: "Name of the agent"
      - name: kGAgentIdentifier
        property_uri: "http://vital.ai/ontology/haley-ai-kg#hasKGAgentIdentifier"
        type: string
        description: "Identifier of the agent"
      - name: kGAgentAvatarImageURL
        property_uri: "http://vital.ai/ontology/haley-ai-kg#hasKGAgentAvatarImageURL"
        type: string
        description: "Agent Avatar Image URL"
      - name: kGAgentDescription
