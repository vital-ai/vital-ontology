        type: string
        named_vectors:
          - value
        description: "Description of the agent"
      - name: kGAgentType
        property_uri: "http://vital.ai/ontology/haley-ai-kg#hasKGAgentType"
        type: string
        description: "Type Identifier of the agent"
      - name: kGAgentTypeDescription
        property_uri: "http://vital.ai/ontology/haley-ai-kg#hasKGAgentTypeDescription"
        type: string
        named_vectors:
          - type
        description: "Type Description of the agent"
    cross_links: []

